name: QTS Query Every 71 Minutes

on:
  schedule:
    # Run at minute 11 of every hour, then skip the next hour (approximately 71 minutes)
    - cron: '11 */2 * * *'
  workflow_dispatch:

jobs:
  call-api-job:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase GET Function 'gradespark'
        run: |
          curl -f -L -X GET 'https://qzwfyjuathzorckzthcy.supabase.co/functions/v1/gradespark' \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"